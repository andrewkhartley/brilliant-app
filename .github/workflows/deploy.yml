name: Deploy to KnownHost

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: brilliant-production
  cancel-in-progress: false

env:
  DEPLOY_PATH: /home/undaunted/brilliant-app
  SERVER_PHP: /opt/cpanel/ea-php84/root/usr/bin/php

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare production artifact
        run: |
          rm -rf node_modules
          rm -rf tests
          rm -rf storage/logs/*
          rm -rf storage/framework/cache/*
          rm -rf storage/framework/sessions/*
          rm -rf storage/framework/views/*

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Verify SSH access
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/id_rsa -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "echo 'SSH deploy connection OK'"

      - name: Deploy with rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.idea/' \
            --exclude='.claude/' \
            --exclude='database/database.sqlite' \
            --exclude='node_modules/' \
            --exclude='public/hot' \
            --exclude='storage/logs/' \
            --exclude='storage/framework/cache/' \
            --exclude='storage/framework/sessions/' \
            --exclude='storage/framework/views/' \
            -e "ssh -o IdentitiesOnly=yes -i ~/.ssh/id_rsa -p ${SSH_PORT}" \
            ./ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Finalize Laravel on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -o IdentitiesOnly=yes -i ~/.ssh/id_rsa -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "cd '${DEPLOY_PATH}' && \
            mkdir -p storage/app/private storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache && \
            if [ ! -f database/database.sqlite ]; then touch database/database.sqlite; fi && \
            chmod -R ug+rw storage bootstrap/cache && \
            '${SERVER_PHP}' artisan config:clear && \
            '${SERVER_PHP}' artisan route:clear && \
            '${SERVER_PHP}' artisan view:clear && \
            '${SERVER_PHP}' artisan migrate --force && \
            '${SERVER_PHP}' artisan db:seed --class=SolarSystemFactsSeeder --force && \
            '${SERVER_PHP}' artisan config:cache && \
            '${SERVER_PHP}' artisan route:cache && \
            '${SERVER_PHP}' artisan view:cache"
